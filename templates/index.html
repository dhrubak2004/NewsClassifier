<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Classifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #ff4444;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            padding: 16px;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: #ff4444; }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #cc0000; }
        button:disabled { background: #555; cursor: not-allowed; }
        .result {
            margin-top: 30px;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 24px;
            display: none;
        }
        .category-badge {
            display: inline-block;
            background: #ff4444;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .confidence {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 12px;
        }
        .confidence span {
            color: #4caf50;
            font-weight: bold;
        }
        .reason {
            color: #ccc;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keyword {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ccc;
        }
        .error {
            color: #ff4444;
            margin-top: 12px;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #888;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 News Classifier</h1>
        <p class="subtitle">Paste any news article and get instant AI-powered classification</p>

        <textarea id="article" placeholder="Paste your news article here..."></textarea>
        <button id="classifyBtn" onclick="classify()">Classify Article</button>

        <div class="loading" id="loading">⏳ Classifying...</div>
        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="category-badge" id="category"></div>
            <div class="confidence">Confidence: <span id="confidence"></span></div>
            <div class="reason" id="reason"></div>
            <div class="keywords" id="keywords"></div>
        </div>
    </div>

    <script>
        async function classify() {
            const article = document.getElementById('article').value.trim();
            const btn = document.getElementById('classifyBtn');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            if (!article) {
                document.getElementById('error').textContent = 'Please paste a news article first.';
                return;
            }

            btn.disabled = true;
            loading.style.display = 'block';
            error.textContent = '';
            result.style.display = 'none';

            try {
                const response = await fetch('/classify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ article })
                });

                const data = await response.json();

                if (data.error) {
                    error.textContent = data.error;
                } else {
                    document.getElementById('category').textContent = data.category;
                    document.getElementById('confidence').textContent = data.confidence;
                    document.getElementById('reason').textContent = data.reason;

                    const keywordsDiv = document.getElementById('keywords');
                    keywordsDiv.innerHTML = '';
                    data.keywords.forEach(k => {
                        const span = document.createElement('span');
                        span.className = 'keyword';
                        span.textContent = k;
                        keywordsDiv.appendChild(span);
                    });

                    result.style.display = 'block';
                }
            } catch (err) {
                error.textContent = 'Something went wrong. Please try again.';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
